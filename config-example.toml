log_level = "debug"
# 日志保留天数，默认 7 天
# log_retention = 7
# Session 保留天数，默认 7 天
# session_retention = 7
# 资源文件保留天数，默认 7 天
# resource_retention = 7

[feishu]
app_id = "cli_xxxxxxx"
app_secret = "xxxxxxxxx"

[kiro]
cmd = "kiro-cli"
args = ["acp", "--agent", "lark"]
# 进程池大小，通过 thread_id hash 路由实现并行处理，默认 4
# pool_size = 4
# Agent 工作目录，用作项目上下文路径；未配置时默认为 ~/.acp-link/temp/
# cwd = "/path/to/your/project"

[mcp]
# HTTP 监听端口，默认 9800
# port = 9800
