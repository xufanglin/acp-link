# acp-link 配置文件
#
# 配置查找优先级：
#   1. 环境变量 ACP_LINK_CONFIG 指定的路径
#   2. 当前工作目录下的 config.toml
#   3. ~/.acp-link/config.toml（首次运行自动生成）

# 日志级别：trace / debug / info / warn / error
log_level = "info"

# 日志保留天数（默认 7），超过后自动清理历史日志文件
# log_retention = 7

# Session 保留天数（默认 7），超过后自动清理 sessions.json 中的过期记录
# session_retention = 7

# 资源文件保留天数（默认 7），超过后自动清理 data/ 和 temp/ 中的过期文件
# resource_retention = 7

# ── IM 平台配置（配置哪个就用哪个，只能选一个）────────────────
[im.feishu]
app_id = "cli_xxxxxxx"
app_secret = "xxxxxxxxx"

# ── ACP Backend Agent 配置 ────────────────────────────────────
# 支持 kiro-cli、claude 等任意 ACP 兼容 agent
[backend]
cmd = "kiro-cli"
args = ["acp", "--agent", "lark"]

# 进程池大小，通过 topic_id hash 路由实现并行处理（默认 4）
# 同一 topic 的消息始终路由到同一个 worker，保证 session 上下文连续
# pool_size = 4

# Agent 工作目录，用作项目上下文路径
# 未配置时默认为 ~/.acp-link/temp/
# cwd = "/path/to/your/project"

# ── MCP Server 配置 ──────────────────────────────────────────
[mcp]
# HTTP 监听端口（默认 9800）
# agent 的 mcpServers.feishu.url 需与此端口一致
# port = 9800

# ── 定时任务配置（可以配置多个）────────────────────────────────
# 每个 [[cron]] 块代表一条定时任务。
# schedule 使用标准 5 位 cron 表达式：分 时 日 月 周（0/7 均表示周日）
#   字段范围：分(0-59)  时(0-23)  日(1-31)  月(1-12)  周(0-7)
#   常用示例：
#     "0 9 * * 1-5"   每个工作日 09:00
#     "30 18 * * *"   每天 18:30
#     "0 10 1 * *"    每月 1 日 10:00
# 任务触发时，prompt 会发给 agent，响应以消息卡片形式发到 target_id。
#
# 示例：工作日早 9 点发送日报提醒
# [[cron]]
# schedule = "0 9 * * 1-5"
# prompt = "请生成今日工作计划摘要"
# target_id = "oc_xxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxx"
# target_type = "p2p"   # p2p（单聊）或 group（群聊），默认 p2p
