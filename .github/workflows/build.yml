name: Build

on:
  push:
    tags: ["v*"]

jobs:
  build:
    name: Build ${{ matrix.target }}
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        include:
          - target: x86_64-unknown-linux-musl
            artifact: acp-link-x86_64-linux-musl
            os: ubuntu-latest
            use-zigbuild: true
          - target: aarch64-unknown-linux-musl
            artifact: acp-link-aarch64-linux-musl
            os: ubuntu-latest
            use-zigbuild: true
          - target: aarch64-apple-darwin
            artifact: acp-link-aarch64-apple-darwin
            os: macos-latest
            use-zigbuild: false

    steps:
      - uses: actions/checkout@v4

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Install cargo-zigbuild
        if: matrix.use-zigbuild
        uses: taiki-e/install-action@v2
        with:
          tool: cargo-zigbuild

      - name: Install Zig
        if: matrix.use-zigbuild
        uses: mlugg/setup-zig@v2

      - name: Build (zigbuild)
        if: matrix.use-zigbuild
        run: cargo zigbuild --release --target ${{ matrix.target }}

      - name: Build (native)
        if: ${{ !matrix.use-zigbuild }}
        run: cargo build --release --target ${{ matrix.target }}

      - name: Prepare artifact
        run: |
          cp target/${{ matrix.target }}/release/acp-link ${{ matrix.artifact }}
          chmod +x ${{ matrix.artifact }}

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact }}
          path: ${{ matrix.artifact }}
          retention-days: 7

  release:
    name: Create Release
    needs: build
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/v')
    permissions:
      contents: write

    steps:
      - name: Download artifacts
        uses: actions/download-artifact@v4
        with:
          merge-multiple: true

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            acp-link-x86_64-linux-musl
            acp-link-aarch64-linux-musl
            acp-link-aarch64-apple-darwin
